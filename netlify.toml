# Netlify configuration for GAV Levice Erasmus+ Website
# ─────────────────────────────────────────────────────

[build]
  publish = "."   # your index.html is in the root

# Enable Netlify Identity (needed for CMS login)
# After deploying: go to Netlify → Site settings → Identity → Enable
# Then: Identity → Services → Git Gateway → Enable

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Redirect /admin to /admin/index.html
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
